name: ThreatOps Sentinel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r phase1-siem-pipeline/ phase2-detection-engine/ phase3-soar/ \
            -f json -o bandit-report.json --exit-zero
          bandit -r phase1-siem-pipeline/ phase2-detection-engine/ phase3-soar/ \
            --severity-level medium

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  lint:
    name: Code Quality (Flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 phase1-siem-pipeline/ phase2-detection-engine/ phase3-soar/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --statistics

  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install boto3 botocore pyyaml requests

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term \
            --ignore=infra/ || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  sigma-validate:
    name: Validate Sigma Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate Sigma rule YAML syntax
        run: |
          python3 - <<'EOF'
          import yaml, os, sys
          rules_dir = "phase2-detection-engine/sigma_rules"
          errors = []
          for f in os.listdir(rules_dir):
              if f.endswith(".yml"):
                  path = os.path.join(rules_dir, f)
                  try:
                      with open(path) as fh:
                          data = yaml.safe_load(fh)
                      required = ["title","id","status","description","tags","detection"]
                      missing = [k for k in required if k not in data]
                      if missing:
                          errors.append(f"{f}: missing fields {missing}")
                      else:
                          print(f"✅ {f} — valid")
                  except yaml.YAMLError as e:
                      errors.append(f"{f}: YAML error — {e}")
          if errors:
              print("\n❌ Sigma validation errors:")
              for e in errors: print(f"  {e}")
              sys.exit(1)
          print(f"\n✅ All {len(os.listdir(rules_dir))} Sigma rules valid")
          EOF

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [security-scan, lint, unit-tests, sigma-validate]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "=================================="
          echo "  ThreatOps Sentinel CI Summary"
          echo "=================================="
          echo "  Security Scan : ${{ needs.security-scan.result }}"
          echo "  Lint          : ${{ needs.lint.result }}"
          echo "  Unit Tests    : ${{ needs.unit-tests.result }}"
          echo "  Sigma Rules   : ${{ needs.sigma-validate.result }}"
          echo "=================================="
