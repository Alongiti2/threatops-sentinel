name: ThreatOps Sentinel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r phase1-siem-pipeline/ phase2-detection-engine/ phase3-soar/ \
            -f json -o bandit-report.json --exit-zero
          bandit -r phase1-siem-pipeline/ phase2-detection-engine/ phase3-soar/ \
            --severity-level medium --exit-zero

  code-quality:
    name: Code Quality (Flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8
        run: |
          flake8 phase1-siem-pipeline/ phase2-detection-engine/ phase3-soar/ \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E303,W291,W293,E231,E225,E261,E262,W292 \
            --exit-zero

  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pytest boto3 requests

      - name: Run tests
        run: pytest tests/ -v --tb=short || true

  sigma-validation:
    name: Sigma Rule Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate Sigma YAML files
        run: |
          python -c "
          import yaml, os, sys
          errors = []
          for root, dirs, files in os.walk('phase2-detection-engine'):
              for f in files:
                  if f.endswith('.yml'):
                      path = os.path.join(root, f)
                      try:
                          yaml.safe_load(open(path))
                          print(f'OK: {path}')
                      except yaml.YAMLError as e:
                          errors.append(f'FAIL: {path}: {e}')
          if errors:
              print('\n'.join(errors))
          else:
              print('All Sigma rules valid.')
          "
