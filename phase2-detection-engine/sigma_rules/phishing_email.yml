title: Phishing Email - Suspicious Attachment Execution
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: production
description: Detects execution of processes spawned from email client applications,
  indicating potential phishing attachment execution.
references:
  - https://attack.mitre.org/techniques/T1566/
author: Delphin Alongiti - ThreatOps Sentinel
date: 2026-06-24
tags:
  - attack.initial_access
  - attack.t1566
  - attack.t1566.001
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    ParentImage|endswith:
      - '/thunderbird'
      - '/evolution'
      - '/mutt'
      - '/alpine'
    Image|endswith:
      - '/bash'
      - '/sh'
      - '/python3'
      - '/python'
      - '/perl'
      - '/wget'
      - '/curl'
  filter_legitimate:
    CommandLine|contains:
      - '--check-update'
      - '--version'
  condition: selection and not filter_legitimate
falsepositives:
  - Legitimate email client scripting extensions
  - Automated email processing pipelines
level: high
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
  - ProcessId
