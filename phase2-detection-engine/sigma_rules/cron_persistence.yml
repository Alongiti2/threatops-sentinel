title: Cron Job Persistence - Scheduled Task Creation
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: production
description: Detects creation or modification of cron jobs that may indicate
  adversary persistence via scheduled tasks.
references:
  - https://attack.mitre.org/techniques/T1053/003/
author: Delphin Alongiti - ThreatOps Sentinel
date: 2026-06-24
tags:
  - attack.persistence
  - attack.t1053
  - attack.t1053.003
logsource:
  category: file_event
  product: linux
detection:
  selection_crontab_files:
    TargetFilename|startswith:
      - '/etc/cron'
      - '/var/spool/cron'
      - '/etc/anacrontab'
    TargetFilename|endswith:
      - '.sh'
      - '.py'
      - '.pl'
  selection_crontab_write:
    TargetFilename|startswith:
      - '/etc/cron.d/'
      - '/etc/cron.daily/'
      - '/etc/cron.hourly/'
      - '/etc/cron.weekly/'
      - '/etc/cron.monthly/'
  selection_crontab_command:
    Image|endswith:
      - '/crontab'
    CommandLine|contains:
      - '-e'
  filter_package_manager:
    ParentImage|contains:
      - '/apt'
      - '/dpkg'
      - '/yum'
      - '/rpm'
  condition: (1 of selection_*) and not filter_package_manager
falsepositives:
  - Legitimate software installations via package managers
  - System administrators adding scheduled maintenance tasks
  - Backup software configuration
level: medium
fields:
  - TargetFilename
  - Image
  - CommandLine
  - User
  - ParentImage
