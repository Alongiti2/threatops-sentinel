title: Defense Evasion - Log Clearing and Tampering
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: production
description: Detects attempts to clear or tamper with system logs, a common
  defense evasion technique used by adversaries to hide their tracks.
references:
  - https://attack.mitre.org/techniques/T1070/
  - https://attack.mitre.org/techniques/T1562/008/
author: Delphin Alongiti - ThreatOps Sentinel
date: 2026-06-24
tags:
  - attack.defense_evasion
  - attack.t1070
  - attack.t1070.002
  - attack.t1562.008
logsource:
  category: process_creation
  product: linux
detection:
  selection_log_clear:
    CommandLine|contains:
      - '> /var/log/auth.log'
      - '> /var/log/syslog'
      - '> /var/log/messages'
      - '> /var/log/secure'
      - 'truncate -s 0'
      - 'shred /var/log'
  selection_journald_clear:
    Image|endswith:
      - '/journalctl'
    CommandLine|contains:
      - '--vacuum-time'
      - '--vacuum-size'
      - '--rotate'
  selection_auditd_stop:
    Image|endswith:
      - '/systemctl'
      - '/service'
    CommandLine|contains:
      - 'stop auditd'
      - 'disable auditd'
      - 'stop rsyslog'
  selection_aws_cloudtrail:
    eventName:
      - 'StopLogging'
      - 'DeleteTrail'
      - 'UpdateTrail'
    errorCode: 'null'
  filter_legitimate_rotation:
    ParentImage|endswith:
      - '/logrotate'
      - '/newsyslog'
  condition: (1 of selection_*) and not filter_legitimate_rotation
falsepositives:
  - Legitimate log rotation by logrotate daemon
  - System maintenance scripts
  - Disk space management operations
level: critical
fields:
  - CommandLine
  - Image
  - ParentImage
  - User
  - eventName
