title: Credential Dumping - OS Credential Access
id: e5f6a7b8-c9d0-1234-efab-345678901234
status: production
description: Detects credential dumping attempts targeting OS credential stores,
  memory, or sensitive files containing authentication material.
references:
  - https://attack.mitre.org/techniques/T1003/
author: Delphin Alongiti - ThreatOps Sentinel
date: 2026-06-24
tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
logsource:
  category: process_creation
  product: linux
detection:
  selection_memory_dump:
    Image|endswith:
      - '/gdb'
      - '/strings'
      - '/dd'
    CommandLine|contains:
      - '/proc/'
      - 'mem'
      - 'maps'
  selection_shadow_access:
    Image|endswith:
      - '/cat'
      - '/cp'
      - '/less'
      - '/more'
      - '/head'
      - '/tail'
    CommandLine|contains:
      - '/etc/shadow'
      - '/etc/gshadow'
      - '/etc/master.passwd'
  selection_credential_files:
    TargetFilename|contains:
      - '/.ssh/id_rsa'
      - '/.ssh/id_ed25519'
      - '/.aws/credentials'
      - '/.azure/credentials'
      - '/home/'
    TargetFilename|endswith:
      - 'id_rsa'
      - 'id_dsa'
      - 'id_ecdsa'
      - 'id_ed25519'
      - '.pem'
      - '.pfx'
  selection_ptrace_dump:
    syscall: 'ptrace'
    Image|endswith:
      - '/gdb'
      - '/strace'
      - '/ltrace'
  selection_mimikatz_patterns:
    CommandLine|contains:
      - 'sekurlsa'
      - 'lsadump'
      - 'kerberos::list'
      - 'privilege::debug'
  filter_legitimate:
    ParentImage|endswith:
      - '/ssh-keygen'
      - '/backup'
    User: 'root'
    CommandLine|contains: '--backup'
  condition: (1 of selection_*) and not filter_legitimate
falsepositives:
  - Security scanning tools like Lynis or OpenSCAP
  - Legitimate backup scripts accessing SSH keys
  - Forensic investigation tools used by authorized personnel
level: critical
fields:
  - Image
  - CommandLine
  - TargetFilename
  - User
  - ParentImage
  - syscall
